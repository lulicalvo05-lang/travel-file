<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .choices button {
      font-size: 20px;
      padding: 15px 25px;
      margin: 10px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: #3498db;
      color: white;
      transition: 0.3s;
    }

    .choices button:hover {
      background: #2980b9;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
    }

    .score {
      margin-top: 20px;
      font-size: 22px;
    }

    .winner {
      margin-top: 30px;
      font-size: 26px;
      font-weight: bold;
      color: green;
    }

    .reset-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: #e74c3c;
      color: white;
      display: none;
    }

    .reset-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>

  <h1>Rock Paper Scissors</h1>

  <div class="choices">
    <button onclick="play('rock')">🪨 Rock</button>
    <button onclick="play('paper')">📄 Paper</button>
    <button onclick="play('scissors')">✂️ Scissors</button>
  </div>

  <div class="result" id="result"></div>

  <div class="score">
    Player: <span id="playerScore">0</span> |
    Computer: <span id="computerScore">0</span>
  </div>

  <div class="winner" id="winner"></div>

  <button class="reset-btn" onclick="resetGame()" id="resetBtn">Play Again</button>

  <script>
    let playerScore = 0;
    let computerScore = 0;
    const choices = ['rock', 'paper', 'scissors'];

    function play(playerChoice) {
      if (playerScore >= 5 || computerScore >= 5) return;

      const computerChoice = choices[Math.floor(Math.random() * 3)];

      let resultText = `You chose ${playerChoice}. Computer chose ${computerChoice}. `;

      if (playerChoice === computerChoice) {
        resultText += "It's a tie! No points.";
      } else if (
        (playerChoice === 'rock' && computerChoice === 'scissors') ||
        (playerChoice === 'paper' && computerChoice === 'rock') ||
        (playerChoice === 'scissors' && computerChoice === 'paper')
      ) {
        playerScore++;
        resultText += "You win this round!";
      } else {
        computerScore++;
        resultText += "Computer wins this round!";
      }

      document.getElementById("result").textContent = resultText;
      updateScore();
      checkWinner();
    }

    function updateScore() {
      document.getElementById("playerScore").textContent = playerScore;
      document.getElementById("computerScore").textContent = computerScore;
    }

    function checkWinner() {
      if (playerScore === 5) {
        document.getElementById("winner").textContent = "🎉 You won the game!";
        document.getElementById("resetBtn").style.display = "inline-block";
      } else if (computerScore === 5) {
        document.getElementById("winner").textContent = "💻 Computer won the game!";
        document.getElementById("resetBtn").style.display = "inline-block";
      }
    }

    function resetGame() {
      playerScore = 0;
      computerScore = 0;
      document.getElementById("result").textContent = "";
      document.getElementById("winner").textContent = "";
      document.getElementById("resetBtn").style.display = "none";
      updateScore();
    }
  </script>

</body>
</html>
